services:
  - type: web
    name: ai-exam-proctoring-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon

    envVars:
      - key: JWT_SECRET
        generateValue: true

      - key: ADMIN_PASSWORD
        sync: false

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: DB_PATH
        value: /tmp/violations.db

      - key: TOKEN_TTL_HOURS
        value: "4"

      - key: APP_ENV
        value: production

    healthCheckPath: /health
    autoDeploy: trues